name: The_Heartbeat
on: [push]

jobs:
  verify-existence:
    name: Verify code is pushed to the repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "Test doesn't exist yet."

      - name: The Announcement
        run: echo "The code has arrived. The factory is alive."
